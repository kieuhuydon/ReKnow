<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .note-content { background: #f5f5f5; padding: 15px; border-radius: 8px; }
        .footer { color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Xin chào <span th:text="${userName}">User</span>! 👋</h2>
    <p>Ghi chú hôm nay từ sách <b th:text="${bookTitle}">Book</b>:</p>
    <div class="note-content">
        <p th:text="${noteContent}">Note content here...</p>
    </div>
    <div class="footer">
        <p>ReKnow — Ôn lại kiến thức mỗi ngày 📚</p>
    </div>
</div>
</body>
</html>
