spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/reknow # Tên database của bạn
    username: postgres # Username PostgreSQL
    password: your_password # Password PostgreSQL
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # Dùng 'create' lần đầu, sau đó chuyển sang 'update'
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com # Gmail dùng để gửi email
    password: your_app_password # App Password (không phải password Gmail thường)
    # Tạo tại: Google Account → Security → App Passwords
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

jwt:
  secret-key: your_jwt_secret_key_at_least_256_bits_long # Chuỗi bí mật, càng dài càng tốt
  expiration: 900000 # 15 phút

app:
  admin:
    email: admin@reknow.com # Email tài khoản admin mặc định
    password: Admin@123 # Password tài khoản admin mặc định
